<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Precision Fertigation DSS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .auth-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); width: 100%; max-width: 400px; }
    .auth-card h2 { color: #2e7d32; margin-bottom: 1rem; text-align: center; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; font-weight: 500; }
    .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    .btn { width: 100%; padding: 0.9rem; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: 0.2s; }
    .btn:hover { background: #1b5e20; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .status-msg { margin-top: 1rem; padding: 0.6rem; border-radius: 6px; text-align: center; font-size: 0.85rem; display: none; }
    .success { background: #e8f5e9; color: #2e7d32; } .error { background: #ffebee; color: #c62828; }
    .footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #666; }
    .footer a { color: #2e7d32; text-decoration: none; }
    .nav-links { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 0.9rem; }
    .nav-links a { text-decoration: none; color: #2e7d32; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="nav-links"><a href="index.html">🌱 Home</a><a href="Register.html">Create Account</a></div>
    <h2>🔐 Welcome Back</h2>
    <form id="loginForm">
      <div class="form-group"><label for="email">Email Address</label><input type="email" id="email" required placeholder="you@example.com"></div>
      <div class="form-group"><label for="password">Password</label><input type="password" id="password" required placeholder="••••••••"></div>
      <button type="submit" class="btn" id="loginBtn">Sign In</button>
    </form>
    <div id="statusMsg" class="status-msg"></div>
    <div class="footer">Don't have an account? <a href="Register.html">Create one</a></div>
  </div>

  <script>
    const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
      ? 'http://127.0.0.1:5000' : 'https://precisionfertigation-3.onrender.com';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const msg = document.getElementById('statusMsg');
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      btn.disabled = true; btn.textContent = 'Signing in...'; msg.style.display = 'none';

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');

        localStorage.setItem('pfdss_token', data.access_token);
        localStorage.setItem('pfdss_user', JSON.stringify(data.user));
        
        msg.textContent = '✅ Login successful! Redirecting...';
        msg.className = 'status-msg success'; msg.style.display = 'block';
        setTimeout(() => window.location.href = 'data-acquisition.html', 1000);
      } catch (err) {
        msg.textContent = `❌ ${err.message}`; msg.className = 'status-msg error'; msg.style.display = 'block';
      } finally { btn.disabled = false; btn.textContent = 'Sign In'; }
    });
  </script>
</body>
</html>
